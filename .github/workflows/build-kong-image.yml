name: Build and publish Kong image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "kong/**"
      - ".github/workflows/build-kong-image.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kong/**"
      - ".github/workflows/build-kong-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/kong

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from kong package or use git sha
        id: version
        run: |
          echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kong
          file: ./kong/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    needs: build  # Wait for build to complete
    runs-on: self-hosted # Your runner labels
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'  # Only deploy main branch, not PRs
    steps:
      - name: Deploy to Portainer via Webhook
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.short-sha }}"

          trigger_portainer_webhook() {
            local name="$1"
            local url="$2"

            if [ -z "$url" ]; then
              echo "ℹ️  Skipping $name webhook because URL is empty"
              return 0
            fi

            echo "➡️  Triggering $name webhook"

            local response
            local curl_exit
            local http_status
            local response_body

            set +e
            response=$(curl -sS -L -X POST "$url" \
              -H "Content-Type: application/json" \
              --data '{}' \
              --connect-timeout 10 \
              --max-time 30 \
              --retry 2 \
              --retry-delay 2 \
              -w "HTTPSTATUS:%{http_code}")
            curl_exit=$?
            set -e

            # curl exit code 60 = TLS certificate verify failed (common with internal/self-signed certs)
            if [ "$curl_exit" -eq 60 ]; then
              echo "⚠️  TLS verification failed for $name webhook. Retrying with --insecure."
              set +e
              response=$(curl -sS -L -X POST "$url" \
                -H "Content-Type: application/json" \
                --data '{}' \
                --connect-timeout 10 \
                --max-time 30 \
                --retry 2 \
                --retry-delay 2 \
                --insecure \
                -w "HTTPSTATUS:%{http_code}")
              curl_exit=$?
              set -e
            fi

            if [ "$curl_exit" -ne 0 ]; then
              echo "❌ $name webhook request failed before HTTP response (curl exit: $curl_exit)"
              exit 1
            fi

            http_status=$(printf '%s' "$response" | sed -e 's/.*HTTPSTATUS://')
            response_body=$(printf '%s' "$response" | sed -e 's/HTTPSTATUS:.*//')

            if [ "$http_status" -ne 200 ] && [ "$http_status" -ne 202 ] && [ "$http_status" -ne 204 ]; then
              echo "❌ $name webhook failed with HTTP status: $http_status"
              if [ -n "$response_body" ]; then
                echo "Response body:"
                echo "$response_body"
              fi
              exit 1
            fi

            echo "✅ $name webhook triggered successfully (HTTP $http_status)"
          }

          # 1) Trigger Kong-specific deployment webhook
          trigger_portainer_webhook "Kong deployment" "${{ secrets.PORTAINER_KONG_WEBHOOK_URL }}"

          # 2) Trigger full stack deployment webhook (optional)
          # Set PORTAINER_STACK_WEBHOOK_URL on the self-hosted runner or as a workflow env var.
          trigger_portainer_webhook "Portainer stack deployment" "${PORTAINER_STACK_WEBHOOK_URL:-}"
