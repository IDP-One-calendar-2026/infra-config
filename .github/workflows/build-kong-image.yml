name: Build and publish Kong image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "kong/**"
      - ".github/workflows/build-kong-image.yml"
  pull_request:
    branches:
      - main
    paths:
      - "kong/**"
      - ".github/workflows/build-kong-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/kong

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from kong package or use git sha
        id: version
        run: |
          echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./kong
          file: ./kong/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    needs: build  # Wait for build to complete
    runs-on: self-hosted  # Your runner labels
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'  # Only deploy main branch, not PRs
    steps:
      - name: Deploy to Portainer via Webhook
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.short-sha }}"
          
          # Trigger Portainer webhook (internal URL only accessible from self-hosted runner)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_KONG_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 204 ]; then
            echo "❌ Deployment failed with HTTP status: $HTTP_STATUS"
            exit 1
          fi
          
          echo "✅ Kong deployment triggered successfully in Portainer"
