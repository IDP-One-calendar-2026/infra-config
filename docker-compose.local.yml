volumes:
  auth_data:
  drizzle-gateway:

networks:
  io-network:
    driver: bridge
  business-logic-network:
    driver: bridge
  ui-network:
    driver: bridge
  auth-network:
    driver: bridge
  auth-admin-network:
    driver: bridge