services:
  kong:
    build:
      context: ./kong
      dockerfile: Dockerfile
    image: infra-config-kong:local
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yaml"
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    networks:
      - auth-network
      - ui-network
      - business-logic-network
      - auth-admin-network
    deploy:
      replicas: 1

  auth-service:
    # image: ghcr.io/idp-one-calendar-2026/auth-service:latest
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    image: auth-service:local
    environment:
      DATABASE_URL: "file:/data/auth.db"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      VITE_UI_URL: ${VITE_UI_URL}
      VITE_API_URL: ${VITE_API_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
    volumes:
      - auth_data:/data
    networks:
      - auth-network
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any
  
  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    restart: always
    ports:
      - "4983:4983"
    environment:
      PORT: "4983"
      STORE_PATH: "/app"
      MASTERPASS: ${ADMIN_PASSWORD}
    volumes:
      - auth_data:/data
      - drizzle-gateway:/app
    networks:
      - auth-admin-network
      - auth-network
  ui-service:
    # image: ghcr.io/idp-one-calendar-2026/ui:latest
    build:
      context: ../ui
      dockerfile: Dockerfile
    image: ui-service:local
    environment:
      VITE_BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      VITE_API_URL: ${VITE_API_URL}
    networks:
      - ui-network
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any

