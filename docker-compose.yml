version: "3.8"

services:
  kong:
    image: kong:latest
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yaml"
    configs:
      - source: kong_config
        target: /usr/local/kong/declarative/kong.yaml
    networks:
      - auth-network
    deploy:
      replicas: 1

  auth-service:
    image: ghcr.io/idp-one-calendar-2026/auth-service:latest
    environment:
      DATABASE_URL: "file:/data/auth.db"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      VITE_UI_URL: ${VITE_UI_URL}
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - auth_data:/data
    networks:
      - auth-network
    deploy:
      replicas: 1

configs:
  kong_config:
    file: ./kong.yaml

volumes:
  auth_data:

networks:
  auth-network:
    driver: overlay