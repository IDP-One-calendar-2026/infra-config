_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-route
        paths:
          - /auth
  - name: ui-service
    url: http://ui-service:4173
    routes:
    - name: ui-route
      paths:
        - /
  - name: business-logic-service
    url: http://business-logic-service:3003
    routes:
      - name: business-logic-route
        paths:
          - /api

consumers:
  - username: admin
    basicauth_credentials:
      - username: ${ADMIN_USER}
        password: ${ADMIN_PASSWORD}

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS