_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-route
        paths:
          - /auth
  - name: db-manage-auth-service
    url: https://local.drizzle.studio/?host=auth-service:4983
    routes:
      - name: db-manage-auth-route
        paths:
          - /db-manage-auth
  - name: ui-service
    url: http://ui-service:4173
    routes:
    - name: ui-route
      paths:
        - /

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE