_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-route
        paths:
          - /auth
  - name: db-manage-auth-service
    url: http://auth-service:4983
    routes:
      - name: db-manage-auth-route
        paths:
          - /db-manage-auth
        plugins:
        - name: basic-auth
          config:
            hide_credentials: false
            anonymous: null
        - name: cors
          config:
            origins:
              - "https://local.drizzle.studio"
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            headers:
              - Authorization
              - Content-Type
              - Accept
            credentials: true
  - name: ui-service
    url: http://ui-service:4173
    routes:
    - name: ui-route
      paths:
        - /

consumers:
  - username: admin
    basicauth_credentials:
      - username: ${ADMIN_USER}
        password: ${ADMIN_PASSWORD}

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS